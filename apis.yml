description: >-
  Johnson Controls is a global diversified technology and multi-industrial
  leader serving customers in over 150 countries, providing products,
  services, and solutions for buildings (HVAC, fire, security, building
  automation), energy storage, and connected building platforms (Metasys,
  OpenBlue). No public, self-service developer portal or OpenAPI is
  currently published; partner and customer integrations are typically
  delivered through the OpenBlue and Metasys product lines.
